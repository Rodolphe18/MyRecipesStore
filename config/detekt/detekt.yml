build:
  maxIssues: 10

config:
  validation: true

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: false

complexity:
  LongMethod:
    active: true
    threshold: 200
  LongParameterList:
    active: true
    functionThreshold: 8
  CyclomaticComplexMethod:
    active: true
    threshold: 20

naming:
  FunctionNaming:
    active: true
    functionPattern: '([a-z][a-zA-Z0-9]*|[A-Z][a-zA-Z0-9]*)'
